<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting… - Vorton</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fafafa; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
    p { color: #555; }
  </style>
</head>
<body>
  <p>Redirecting…</p>
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const status = (params.get('STATUS') || '').toLowerCase();
      const id = params.get('ID') || '';
      const query = id ? '?ID=' + encodeURIComponent(id) : '';

      let page = 'payment-processing.html';
      if (['fullypaid', 'paid', 'success'].some(function(s) { return status.indexOf(s) !== -1; })) page = 'payment-success.html';
      else if (['cancelled', 'canceled'].some(function(s) { return status.indexOf(s) !== -1; })) page = 'payment-cancelled.html';
      else if (['failed', 'rejected', 'error'].some(function(s) { return status.indexOf(s) !== -1; })) page = 'payment-unsuccessful.html';
      else if (['pending', 'processing', 'preparing'].some(function(s) { return status.indexOf(s) !== -1; })) page = 'payment-processing.html';

      window.location.replace(page + query);
    })();
  </script>
</body>
</html>
