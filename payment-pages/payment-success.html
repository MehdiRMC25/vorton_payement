<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment successful - Vorton</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fafafa; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: 1px solid #eee; padding: 2.5rem; max-width: 420px; width: 100%; text-align: center; }
    .icon { font-size: 3rem; margin-bottom: 1rem; color: #0d6b2c; }
    .title { font-size: 1.5rem; font-weight: 700; color: #1a1a1a; margin: 0 0 0.5rem; }
    .message { color: #555; margin: 0 0 1.5rem; line-height: 1.5; }
    .btn { display: inline-block; padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600; text-decoration: none; font-size: 1rem; background: #e85d04; color: #fff; }
    .btn:hover { background: #cf5302; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1 class="title">Payment successful</h1>
    <p class="message">Thank you for your order. We'll send a confirmation to your email.</p>
    <a href="/" class="btn">Back to Shop</a>
  </div>
</body>
</html>
